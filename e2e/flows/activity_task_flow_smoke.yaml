appId: ${MAESTRO_APP_ID}
tags:
  - smoke
---
- launchApp:
    appId: ${MAESTRO_APP_ID}
    clearState: true
    permissions:
      notifications: allow
- runFlow: _dev_client_bootstrap.yaml
- runFlow: _notifications_allow_if_visible.yaml

# Login hvis nĂ¸dvendigt
- openLink: 'footballcoach:///(tabs)/profile'
- runFlow:
    when:
      visible:
        id: '^auth\.login\.emailInput$'
    commands:
      - tapOn:
          id: '^auth\.login\.emailInput$'
      - inputText: '${MAESTRO_EMAIL}'
      - tapOn:
          id: '^auth\.login\.passwordInput$'
      - inputText: '${MAESTRO_PASSWORD}'
      - tapOn:
          id: '^auth\.login\.submitButton$'
- runFlow: _post_login_prompt_cleanup.yaml

# Opret aktivitet
- openLink: 'footballcoach:///(tabs)/(home)'
- extendedWaitUntil:
    visible:
      id: '^home\.screen$'
    timeout: 15000
- scrollUntilVisible:
    element:
      id: '^home\.thisWeekPremiumCard\.addButton$'
    direction: DOWN
    timeout: 15000
- tapOn:
    id: '^home\.thisWeekPremiumCard\.addButton$'
- extendedWaitUntil:
    visible:
      id: '^activity\.create\.titleInput$'
    timeout: 15000
- tapOn:
    id: '^activity\.create\.titleInput$'
- inputText: 'Maestro Aktivitet ${MAESTRO_PLATFORM_SUFFIX}'
- tapOn:
    id: '^activity\.create\.locationInput$'
- inputText: "Bane 1\n"
- scrollUntilVisible:
    element:
      id: '^activity\.create\.categoryChip\.3$'
    direction: DOWN
    timeout: 15000
- tapOn:
    id: '^activity\.create\.categoryChip\.3$'
- assertVisible:
    id: '^activity\.create\.categoryChip\.3$'
- scrollUntilVisible:
    element:
      id: '^activity\.create\.intensityToggle$'
    direction: DOWN
    timeout: 15000
- tapOn:
    id: '^activity\.create\.intensityToggle$'
- runFlow:
    when:
      visible: '^Ja, tilfĂ¸j til alle$'
    commands:
      - tapOn: '^Ja, tilfĂ¸j til alle$'
- tapOn:
    id: '^activity\.create\.submitButton$'
- runFlow:
    when:
      visible: 'Succes'
    commands:
      - runFlow:
          when:
            visible: '^OK$'
          commands:
            - tapOn: '^OK$'
      - runFlow:
          when:
            visible: '^Ok$'
          commands:
            - tapOn: '^Ok$'

# Opret opgaveskabelon
- openLink: 'footballcoach:///(tabs)/tasks'
- extendedWaitUntil:
    visible:
      id: '^tasks\.header\.newTaskButton$'
    timeout: 15000
- tapOn:
    id: '^tasks\.header\.newTaskButton$'
- extendedWaitUntil:
    visible:
      id: '^tasks\.modal\.titleInput$'
    timeout: 15000
- tapOn:
    id: '^tasks\.modal\.titleInput$'
- inputText: 'Maestro Opgave E2E ${MAESTRO_PLATFORM_SUFFIX}'
- tapOn:
    id: '^tasks\.modal\.descriptionInput$'
- inputText: 'E2E opgave til activity-task-flow'
- tapOn:
    id: '^tasks\.modal\.titleInput$'
- runFlow: _platform_keyboard_commit_input.yaml
- scrollUntilVisible:
    element:
      id: '^tasks\.modal\.reminderToggle$'
    direction: DOWN
    timeout: 15000
- tapOn:
    id: '^tasks\.modal\.reminderToggle$'
- runFlow:
    when:
      visible:
        id: '^tasks\.modal\.reminderOption\.15$'
    commands:
      - tapOn:
          id: '^tasks\.modal\.reminderOption\.15$'
- swipe:
    start: 50%, 80%
    end: 50%, 30%
- scrollUntilVisible:
    element:
      id: '^tasks\.modal\.feedbackToggle$'
    direction: DOWN
    timeout: 15000
- tapOn:
    id: '^tasks\.modal\.feedbackToggle$'
- runFlow:
    when:
      visible:
        id: '^tasks\.modal\.feedbackDelayOption\.15$'
    commands:
      - tapOn:
          id: '^tasks\.modal\.feedbackDelayOption\.15$'
- scrollUntilVisible:
    element:
      id: '^tasks\.modal\.categoryDropdownToggle$'
    direction: DOWN
    timeout: 15000
- tapOn:
    id: '^tasks\.modal\.categoryDropdownToggle$'
- swipe:
    start: 50%, 80%
    end: 50%, 20%
- scrollUntilVisible:
    element:
      id: '^tasks\.modal\.categoryOption\.3$'
    direction: DOWN
    timeout: 15000
- tapOn:
    id: '^tasks\.modal\.categoryOption\.3$'
- tapOn:
    id: '^tasks\.modal\.saveButton$'
- runFlow:
    when:
      visible: 'Succes'
    commands:
      - runFlow:
          when:
            visible: '^OK$'
          commands:
            - tapOn: '^OK$'
      - runFlow:
          when:
            visible: '^Ok$'
          commands:
            - tapOn: '^Ok$'

# Ă…bn fĂ¸rste aktivitet
- openLink: 'footballcoach:///(tabs)/(home)'
- extendedWaitUntil:
    visible:
      id: '^home\.screen$'
    timeout: 15000
- scrollUntilVisible:
    element:
      id: '^home\.activityCardButton$'
    direction: DOWN
    timeout: 15000
- tapOn:
    id: '^home\.activityCardButton$'
    index: 0
    point: 50%,12%
- extendedWaitUntil:
    visible:
      id: '^activity\.details\.editButton$'
    timeout: 15000
- runFlow:
    when:
      visible:
        id: '^activity\.assign\.openModalButton$'
    commands:
      - tapOn:
          id: '^activity\.assign\.openModalButton$'
      - extendedWaitUntil:
          visible:
            id: '^activity\.assign\.tab\.players$'
          timeout: 10000
      - assertVisible:
          id: '^activity\.assign\.tab\.teams$'
      - tapOn:
          id: '^activity\.assign\.tab\.teams$'
      - assertVisible:
          id: '^activity\.assign\.list\.teams$'
      - tapOn:
          id: '^activity\.assign\.tab\.players$'
      - assertVisible:
          id: '^activity\.assign\.list\.players$'
      - assertVisible:
          id: '^activity\.assign\.saveButton$'
      - tapOn:
          id: '^activity\.assign\.closeButton$'
- scrollUntilVisible:
    element:
      id: '^activity\.details\.(taskButton\.incomplete|feedbackTaskButton\.incomplete)$'
    direction: DOWN
    timeout: 15000

# FuldfĂ¸r intensitet-opgave (hvis synlig)
- runFlow:
    when:
      visible:
        id: '^activity\.details\.intensityTaskButton$'
    commands:
      - tapOn:
          id: '^activity\.details\.intensityTaskButton$'
      - extendedWaitUntil:
          visible:
            id: '^feedback\.scoreInput$'
          timeout: 15000
      - assertVisible: '^Feedback pĂĄ Intensitet$'
      - tapOn:
          id: '^feedback\.scoreInput$'
      - scrollUntilVisible:
          element:
            id: '^feedback\.scoreOption\.5$'
          direction: DOWN
          timeout: 8000
      - tapOn:
          id: '^feedback\.scoreOption\.5$'
      - runFlow:
          when:
            notVisible:
              id: '^feedback\.selectedScore\.5$'
          commands:
            - tapOn:
                id: '^feedback\.scoreOption\.5$'
      - extendedWaitUntil:
          visible:
            id: '^feedback\.selectedScore\.5$'
          timeout: 5000
      - runFlow:
          when:
            visible:
              id: '^feedback\.scoreDoneButton$'
          commands:
            - tapOn:
                id: '^feedback\.scoreDoneButton$'
      - assertVisible:
          id: '^feedback\.selectedScore\.5$'
      - runFlow:
          when:
            visible:
              id: '^feedback\.noteInput$'
          commands:
            - tapOn:
                id: '^feedback\.noteInput$'
            - inputText: 'Maestro intensity note'
      - runFlow: _platform_keyboard_commit_input.yaml
      - runFlow:
          when:
            visible:
              id: '^feedback\.saveButton$'
          commands:
            - tapOn:
                id: '^feedback\.saveButton$'
      - runFlow:
          when:
            visible: '^MarkĂ©r som udfĂ¸rt$'
          commands:
            - tapOn: '^MarkĂ©r som udfĂ¸rt$'
            - runFlow:
                when:
                  visible:
                    id: '^celebration-overlay$'
                commands:
                  - extendedWaitUntil:
                      notVisible:
                        id: '^celebration-overlay$'
                      timeout: 4000

# FuldfĂ¸r normal opgave
- runFlow:
    when:
      visible:
        id: '^activity\.details\.taskButton\.incomplete$'
    commands:
      - tapOn:
          id: '^activity\.details\.taskButton\.incomplete$'
          index: 0
      - extendedWaitUntil:
          visible:
            id: '^activity\.completeButton\.markDone$'
          timeout: 15000
      - tapOn:
          id: '^activity\.completeButton\.markDone$'
      - runFlow:
          when:
            visible:
              id: '^celebration-overlay$'
          commands:
            - extendedWaitUntil:
                notVisible:
                  id: '^celebration-overlay$'
                timeout: 4000

# FuldfĂ¸r feedback-opgave
- runFlow:
    when:
      visible:
        id: '^activity\.details\.feedbackTaskButton\.incomplete$'
    commands:
      - tapOn:
          id: '^activity\.details\.feedbackTaskButton\.incomplete$'
          index: 0
      - runFlow:
          when:
            visible:
              id: '^activity\.completeButton\.markDone$'
          commands:
            - tapOn:
                id: '^activity\.completeButton\.markDone$'
            - runFlow:
                when:
                  visible:
                    id: '^celebration-overlay$'
                commands:
                  - extendedWaitUntil:
                      notVisible:
                        id: '^celebration-overlay$'
                      timeout: 4000
      - extendedWaitUntil:
          visible:
            id: '^feedback\.scoreInput$'
          timeout: 15000
      - tapOn:
          id: '^feedback\.scoreInput$'
      - scrollUntilVisible:
          element:
            id: '^feedback\.scoreOption\.5$'
          direction: DOWN
          timeout: 8000
      - tapOn:
          id: '^feedback\.scoreOption\.5$'
      - runFlow:
          when:
            notVisible:
              id: '^feedback\.selectedScore\.5$'
          commands:
            - tapOn:
                id: '^feedback\.scoreOption\.5$'
      - extendedWaitUntil:
          visible:
            id: '^feedback\.selectedScore\.5$'
          timeout: 5000
      - runFlow:
          when:
            visible:
              id: '^feedback\.scoreDoneButton$'
          commands:
            - tapOn:
                id: '^feedback\.scoreDoneButton$'
      - assertVisible:
          id: '^feedback\.selectedScore\.5$'
      - runFlow:
          when:
            visible:
              id: '^feedback\.noteInput$'
          commands:
            - tapOn:
                id: '^feedback\.noteInput$'
            - inputText: '${MAESTRO_FEEDBACK_NOTE}'
      - runFlow: _platform_keyboard_commit_input.yaml
      - runFlow:
          when:
            visible:
              id: '^feedback\.saveButton$'
          commands:
            - tapOn:
                id: '^feedback\.saveButton$'
      - runFlow:
          when:
            visible: '^MarkĂ©r som udfĂ¸rt$'
          commands:
            - tapOn: '^MarkĂ©r som udfĂ¸rt$'

# Verificer "Seneste feedback" i aktivitetsdetaljer efter gemt feedback
- openLink: 'footballcoach:///(tabs)/(home)'
- extendedWaitUntil:
    visible:
      id: '^home\.screen$'
    timeout: 15000
- scrollUntilVisible:
    element:
      id: '^home\.activityCardButton$'
    direction: DOWN
    timeout: 15000
- tapOn:
    id: '^home\.activityCardButton$'
    index: 0
    point: 50%,12%
- extendedWaitUntil:
    visible:
      id: '^activity\.details\.editButton$'
    timeout: 15000
- scrollUntilVisible:
    element:
      text: '^Seneste feedback$'
    direction: DOWN
    timeout: 15000
- assertVisible: 'Seneste feedback'
- extendedWaitUntil:
    visible: 'Score 5/5'
    timeout: 15000
- extendedWaitUntil:
    visible: '${MAESTRO_FEEDBACK_NOTE}'
    timeout: 15000
# Arkiv smoke-check
- openLink: 'footballcoach:///(tabs)/tasks'
- extendedWaitUntil:
    visible:
      id: '^tasks\.folder\.personal$'
    timeout: 15000
- tapOn:
    id: '^tasks\.folder\.personal$'
- runFlow:
    when:
      visible:
        id: '^tasks\.template\.archiveButton\..+$'
    commands:
      - tapOn:
          id: '^tasks\.template\.archiveButton\..+$'
          index: 0
- tapOn:
    id: '^tasks\.template\.filter\.archivedButton$'
- assertVisible:
    id: '^tasks\.taskCard\..+$'
- tapOn:
    id: '^tasks\.template\.filter\.activeButton$'

# Cleanup: slet aktivitet hvis muligt
- openLink: 'footballcoach:///(tabs)/(home)'
- runFlow:
    when:
      visible:
        id: '^home\.activityCardButton$'
    commands:
      - tapOn:
          id: '^home\.activityCardButton$'
          index: 0
          point: 50%,12%
      - runFlow:
          when:
            visible:
              id: '^activity\.details\.deleteButton$'
          commands:
            - tapOn:
                id: '^activity\.details\.deleteButton$'
            - runFlow:
                when:
                  visible: '^Slet$'
                commands:
                  - tapOn: '^Slet$'
            - runFlow:
                when:
                  visible: '^(OK|Ok)$'
                commands:
                  - tapOn: '^(OK|Ok)$'
# Ryd opgaveskabelon op
- openLink: 'footballcoach:///(tabs)/tasks'
- extendedWaitUntil:
    visible:
      id: '^tasks\.template\.filter\.archivedButton$'
    timeout: 15000
- tapOn:
    id: '^tasks\.template\.filter\.archivedButton$'
- extendedWaitUntil:
    visible:
      id: '^tasks\.folder\.personal$'
    timeout: 15000
- scrollUntilVisible:
    element:
      id: '^tasks\.folder\.personal$'
    direction: UP
    timeout: 10000
- tapOn:
    id: '^tasks\.folder\.personal$'
- runFlow:
    when:
      notVisible:
        id: '^tasks\.task\.delete\..+$'
    commands:
      - tapOn:
          id: '^tasks\.folder\.personal$'
- runFlow:
    when:
      notVisible:
        id: '^tasks\.task\.delete\..+$'
    commands:
      - scrollUntilVisible:
          element:
            id: '^tasks\.task\.delete\..+$'
          direction: DOWN
          timeout: 10000
- runFlow:
    when:
      visible:
        id: '^tasks\.task\.delete\..+$'
    commands:
      - tapOn:
          id: '^tasks\.task\.delete\..+$'
          index: 0
      - runFlow:
          when:
            visible: '^FortsĂ¦t$'
          commands:
            - tapOn: '^FortsĂ¦t$'
      - runFlow:
          when:
            visible:
              id: '^tasks\.template\.deleteModal\.input$'
          commands:
            - tapOn:
                id: '^tasks\.template\.deleteModal\.input$'
            - inputText: 'SLET'
            - pressKey: Enter
            - runFlow: _platform_keyboard_commit_input.yaml
      - runFlow:
          when:
            visible:
              id: '^tasks\.template\.deleteModal\.confirmButton$'
          commands:
            - tapOn:
                id: '^tasks\.template\.deleteModal\.confirmButton$'
      - runFlow:
          when:
            visible: '^(OK|Ok)$'
          commands:
            - tapOn: '^(OK|Ok)$'
      - runFlow:
          when:
            visible:
              id: '^tasks\.template\.deleteModal\.confirmButton$'
          commands:
            - extendedWaitUntil:
                notVisible:
                  id: '^tasks\.template\.deleteModal\.confirmButton$'
                timeout: 10000
